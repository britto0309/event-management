<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCET E-Portal for Bus</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .home-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 60px;
      border-radius: 20px;
      box-shadow: 0 4px 30px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
      font-size: 20px;
    }

    button {
      background: #fff;
      color: #1e3a8a;
      border: none;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #3b82f6;
      color: #fff;
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #e0e7ff;
    }
  </style>
</head>
<body>
  <div class="home-container">
    <h1>VCET E-Portal for Bus</h1>
    <h2>AI Bus Fare Management System</h2>
    <button onclick="location.href='admin.html'">Admin Login</button>
    <button onclick="location.href='student.html'">Student Login</button>
  </div>

  <footer>© 2025 Vellalar College of Engineering and Technology (VCET) | Developed by AI & ML Department</footer>
</body>
</html>
